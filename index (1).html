<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3D5A47">
<title>🇳🇿 紐西蘭家族之旅 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#F2EDE4;font-family:'Noto Sans TC',sans-serif;font-weight:300;color:#2A2A1E;-webkit-text-size-adjust:100%}
a{color:#5A7A8A;text-decoration:none}
input,select,textarea{font-family:inherit;font-size:.88rem;-webkit-appearance:none;appearance:none}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#C4D9C4;border-radius:2px}

/* Layout */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#F2EDE4}

/* Hero */
.hero{position:relative;background:#3D5A47;overflow:hidden}
.hero-text{position:absolute;bottom:0;left:0;right:0;padding:1.2rem 1.4rem 1rem;background:linear-gradient(transparent,rgba(40,60,40,.78))}
.hero-title{font-family:'Noto Serif TC',serif;font-weight:700;font-size:2.3rem;color:white;line-height:1}
.hero-sub{font-family:'Noto Serif TC',serif;font-weight:300;font-size:.95rem;color:rgba(255,255,255,.8);letter-spacing:.18em;margin-top:.2rem}
.hero-pills{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.8rem}
.pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:2rem;padding:.28rem .75rem;font-size:.72rem;color:white}
.pill.gold{background:rgba(196,103,74,.65);border-color:rgba(232,160,136,.5)}

/* Flight bar */
.fbar{background:#3D5A47;border-top:1px solid rgba(255,255,255,.1);padding:.85rem 1.4rem;display:flex;gap:.8rem 2rem;flex-wrap:wrap}
.fseg-dir{font-size:.6rem;color:#8AAE8A;letter-spacing:.1em;margin-bottom:.1rem}
.fseg-route{font-family:'Noto Serif TC',serif;font-size:.9rem;color:white;font-weight:600}
.fseg-time{font-size:.7rem;color:rgba(255,255,255,.65)}

/* Nav */
.nav{position:sticky;top:0;z-index:200;background:rgba(242,237,228,.97);backdrop-filter:blur(12px);border-bottom:1px solid #DDD8CE;display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;border:none;border-bottom:2.5px solid transparent;padding:.85rem .95rem;font-size:.78rem;font-weight:400;color:#7A7A6A;white-space:nowrap;flex-shrink:0;transition:all .2s}
.nav-btn.active{color:#3D5A47;border-bottom-color:#C4674A;font-weight:500}

/* Content */
.content{padding:1.2rem 1rem 6rem}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(242,237,228,.97);backdrop-filter:blur(14px);border-top:1px solid #DDD8CE;display:flex;z-index:300}
.bnav-btn{flex:1;background:none;border:none;padding:.6rem .3rem .5rem;display:flex;flex-direction:column;align-items:center;gap:.18rem}
.bnav-icon{font-size:1.2rem}
.bnav-label{font-size:.6rem;color:#7A7A6A;font-family:inherit;font-weight:400}
.bnav-btn.active .bnav-label{color:#3D5A47;font-weight:500}
.bnav-dot{width:18px;height:2.5px;background:#C4674A;border-radius:2rem}

/* Cards */
.card{background:#FDFAF6;border-radius:14px;border:1px solid #DDD8CE;padding:1.2rem 1.1rem;margin-bottom:.8rem;box-shadow:0 2px 10px rgba(61,90,71,.05)}
.card:active{transform:scale(.985)}

/* Weather */
.weather-bar{background:#E8E0D4;border-radius:10px;padding:.6rem .9rem;display:flex;align-items:center;gap:.8rem;margin-bottom:.8rem}
.w-icon{font-size:1.5rem}
.w-temp{font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;color:#2A2A1E}
.w-desc{font-size:.65rem;color:#7A7A6A}
.w-badge{font-size:.58rem;color:white;border-radius:2rem;padding:.1rem .5rem;white-space:nowrap;margin-left:auto}
.w-real{background:#5A7A62}
.w-climate{background:rgba(196,148,58,.7)}

/* Timeline */
.t-item{display:grid;grid-template-columns:68px 1fr;margin-bottom:0}
.t-left{display:flex;flex-direction:column;align-items:center;padding-top:1.5rem}
.t-bubble{width:42px;height:42px;border-radius:50%;background:#3D5A47;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(44,74,50,.28)}
.t-num{font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;line-height:1}
.t-day{font-size:.42rem;letter-spacing:.06em;opacity:.7;text-transform:uppercase}
.t-stem{width:1px;flex:1;min-height:20px;background:linear-gradient(to bottom,rgba(44,74,50,.22),transparent);margin-top:5px}
.t-card{background:#FDFAF6;border-radius:14px;padding:1.5rem;margin:.9rem 0 .9rem 1rem;border:1px solid #DDD8CE;box-shadow:0 2px 12px rgba(28,43,30,.04)}
.card-date{font-size:.65rem;color:#7A7A6A;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.2rem}
.card-title{font-family:'Noto Serif TC',serif;font-size:1.05rem;font-weight:600;color:#3D5A47;line-height:1.2}
.card-en{font-style:italic;font-size:.78rem;color:#7A7A6A;margin-top:.12rem}
.acts{list-style:none;margin-top:.5rem}
.acts li{display:flex;align-items:flex-start;gap:.6rem;padding:.38rem 0;border-bottom:1px dashed #DDD8CE;font-size:.85rem;color:#333}
.acts li:last-child{border:none}
.act-dot{width:5px;height:5px;border-radius:50%;background:#8AAE8A;flex-shrink:0;margin-top:.55em}
.note-box{background:rgba(196,148,58,.08);border-left:3px solid #C4943A;border-radius:0 8px 8px 0;padding:.55rem .85rem;font-size:.8rem;color:#554;margin-bottom:.7rem}
.accom-box{margin-top:1rem;background:rgba(90,125,94,.07);border-radius:10px;padding:.75rem .9rem;display:flex;align-items:flex-start;gap:.7rem}
.accom-name{font-size:.87rem;font-weight:500;color:#3D5A47}
.accom-detail{font-size:.72rem;color:#7A7A6A;margin-top:.12rem}
.badge{display:inline-block;font-size:.65rem;padding:.15rem .55rem;border-radius:2rem;margin-left:.5rem}
.badge-booked{background:rgba(90,122,90,.2);color:#5A7A62}
.badge-pending{background:rgba(196,103,74,.15);color:#C4674A}
.badge-same{background:#E8E0D4;color:#7A7A6A}

/* Island divider */
.idiv{display:flex;align-items:center;gap:1.2rem;margin:1.8rem 0 1rem}
.idiv hr{flex:1;border:none;border-top:1px solid #DDD8CE}
.idiv-tag{background:#3D5A47;color:#C8DCC8;padding:.35rem 1.1rem;border-radius:2rem;font-size:.72rem;letter-spacing:.1em;white-space:nowrap}

/* Stats grid */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.5rem}
.stat-card{background:#FDFAF6;border-radius:14px;padding:1rem;border:1px solid #DDD8CE}
.stat-icon{font-size:1.3rem;margin-bottom:.3rem}
.stat-lbl{font-size:.65rem;color:#7A7A6A;letter-spacing:.08em;text-transform:uppercase}
.stat-val{font-family:'Noto Serif TC',serif;font-size:.92rem;font-weight:600;color:#3D5A47;margin-top:.15rem}

/* Bookings */
.bk-card{background:#FDFAF6;border-radius:14px;padding:1.2rem;border-left:4px solid #C4674A;border-top:1px solid #DDD8CE;border-right:1px solid #DDD8CE;border-bottom:1px solid #DDD8CE;margin-bottom:1rem;box-shadow:0 2px 10px rgba(61,90,71,.05)}
.bk-card.booked{border-left-color:#5A7A62}
.bk-card.free{border-left-color:#5A7A8A}
.bk-title{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;color:#3D5A47}
.bk-en{font-style:italic;font-size:.72rem;color:#7A7A6A}
.bk-day{font-size:.68rem;color:#7A7A6A;margin-top:.2rem}
.bk-meta{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.8rem 0;font-size:.8rem;color:#444}
.bk-meta-lbl{font-size:.63rem;color:#7A7A6A;margin-bottom:.15rem}
.bk-notes{font-size:.78rem;color:#555;margin-top:.6rem}
.bk-link{display:inline-block;margin-top:.8rem;background:#E8E0D4;color:#5A7A8A;border-radius:8px;padding:.45rem .8rem;font-size:.74rem}
.status-pill{font-size:.7rem;font-weight:500;padding:.22rem .7rem;border-radius:2rem;white-space:nowrap}
.sp-pending{background:rgba(196,103,74,.12);color:#C4674A}
.sp-booked{background:rgba(90,122,90,.15);color:#5A7A62}
.sp-free{background:rgba(90,122,138,.12);color:#5A7A8A}

/* Section header */
.sec-head{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.sec-title{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;white-space:nowrap}
.sec-title.pend{color:#C4674A}
.sec-title.booked{color:#5A7A62}
.sec-line{flex:1;height:1px;background:#DDD8CE}

/* Stay cards */
.stay-card{background:#FDFAF6;border-radius:14px;padding:1rem 1.1rem;border:1px solid #DDD8CE;margin-bottom:.7rem;box-shadow:0 1px 8px rgba(61,90,71,.04)}
.stay-pend{border:1.5px solid rgba(196,103,74,.3)}
.stay-name{font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:600;color:#3D5A47}
.stay-meta{font-size:.72rem;color:#7A7A6A;margin-top:.1rem}
.stay-fields{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:.6rem 0}
.field-lbl{font-size:.63rem;color:#7A7A6A;margin-bottom:.2rem}
.field-inp{width:100%;padding:.35rem .6rem;border:1.5px solid #DDD8CE;border-radius:8px;font-size:.8rem;background:white;color:#2A2A1E}
.url-inp{width:100%;padding:.35rem .6rem;border:1.5px solid #DDD8CE;border-radius:8px;font-size:.8rem;background:white;color:#2A2A1E}
.map-link{font-size:.74rem;color:#5A7A8A;display:inline-block;margin-top:.3rem}
.status-sel{border:1.5px solid #DDD8CE;border-radius:8px;padding:.3rem .5rem;font-size:.74rem;background:white;font-family:inherit}
.edit-btn{background:none;color:#7A7A6A;border:1px solid #DDD8CE;border-radius:8px;padding:.3rem .6rem;font-size:.72rem}
.edit-btn.active{background:#3D5A47;color:white;border-color:#3D5A47}
.sync-ok{color:#5A7A62;font-size:.72rem;margin-top:.4rem}

/* Prep */
.mem-tabs{display:flex;gap:.5rem;overflow-x:auto;margin-bottom:1.4rem;padding-bottom:.3rem;scrollbar-width:none}
.mem-tabs::-webkit-scrollbar{display:none}
.mem-btn{flex-shrink:0;background:white;color:#7A7A6A;border:2px solid #DDD8CE;border-radius:2rem;padding:.45rem 1.1rem;font-size:.8rem;white-space:nowrap;display:flex;align-items:center;gap:.4rem;transition:all .2s}
.mem-btn.active{color:white;border-color:transparent}
.mem-count{font-size:.62rem;padding:.1rem .4rem;border-radius:1rem;background:rgba(90,122,90,.15);color:#5A7A62}
.mem-btn.active .mem-count{background:rgba(255,255,255,.25);color:white}
.prep-section{background:#FDFAF6;border-radius:18px;padding:1.3rem;border:1px solid #DDD8CE;margin-bottom:1.2rem;box-shadow:0 2px 10px rgba(61,90,71,.05)}
.prep-heading{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:600;color:#3D5A47;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.prep-info{border-radius:10px;padding:.8rem 1rem;font-size:.78rem;line-height:1.8;margin-bottom:1rem}
.prep-info.gold{background:rgba(196,148,58,.07);border:1px solid rgba(196,148,58,.3)}
.prep-info.slate{background:rgba(90,122,138,.07);border:1px solid rgba(90,122,138,.25)}
.prep-info.pine{background:rgba(90,125,94,.07);border:1px solid rgba(127,168,118,.3)}
.prep-info.terra{background:rgba(196,103,74,.07);border:1px solid rgba(196,103,74,.25)}
.field-group{margin-bottom:.85rem}
.field-group label{display:block;font-size:.7rem;color:#7A7A6A;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.3rem}
.field-group input,.field-group textarea{width:100%;padding:.65rem .9rem;border:1.5px solid #DDD8CE;border-radius:10px;font-size:.88rem;background:white;color:#2A2A1E}
.field-group textarea{resize:none}

/* Packing */
.progress-bar{background:#DDD8CE;border-radius:2rem;height:6px;margin-bottom:1.2rem;overflow:hidden}
.progress-fill{background:linear-gradient(90deg,#8AAE8A,#3D5A47);height:100%;border-radius:2rem;transition:width .4s ease}
.legend{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.leg-pill{font-size:.65rem;padding:.15rem .6rem;border-radius:2rem;font-weight:500}
.leg-must{background:rgba(196,103,74,.12);color:#C4674A}
.leg-suggest{background:rgba(196,148,58,.1);color:#C4943A}
.leg-opt{background:rgba(90,122,138,.1);color:#5A7A8A}
.cat-btn{width:100%;background:#E8E0D4;border:none;border-radius:10px;padding:.7rem .9rem;display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;font-family:inherit;font-size:.86rem;font-weight:500;color:#3D5A47}
.cat-btn.open{background:rgba(61,90,71,.06)}
.cat-count{font-size:.72rem;color:#7A7A6A;margin-right:.5rem}
.cat-arrow{color:#7A7A6A;font-size:.8rem;transition:transform .2s}
.cat-arrow.open{transform:rotate(180deg)}
.cat-items{padding:.4rem .2rem}
.chk-row{display:flex;align-items:flex-start;gap:.75rem;padding:.6rem .5rem;border-radius:10px;cursor:pointer;transition:background .15s}
.chk-row:hover{background:rgba(90,122,90,.06)}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid #DDD8CE;background:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.5px;transition:all .18s}
.chk-box.checked{border-color:transparent}
.chk-mark{color:white;font-size:.72rem;font-weight:700}
.chk-text{font-size:.84rem;color:#2A2A1E;flex:1}
.chk-text.done{color:#888;text-decoration:line-through}
.chk-level{font-size:.6rem;padding:.12rem .45rem;border-radius:2rem;white-space:nowrap;flex-shrink:0}
.lv-must{background:rgba(196,103,74,.1);color:#C4674A}
.lv-suggest{background:rgba(196,148,58,.1);color:#C4943A}
.lv-opt{background:rgba(90,122,138,.1);color:#5A7A8A}

/* Toast */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#3D5A47;color:white;padding:.55rem 1.4rem;border-radius:2rem;font-size:.8rem;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18);pointer-events:none;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}

/* Sync indicator */
.syncing{font-size:.65rem;color:#8AAE8A;margin-left:.5rem;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="app" id="app">

<!-- FLIGHT BAR -->
<div class="fbar">
  <div><div class="fseg-dir">去程</div><div class="fseg-route">TPE→AKL</div><div class="fseg-time">10/07 23:55→10/08 19:00</div></div>

</div>

<!-- NAV -->
<nav class="nav" id="nav">
  <button class="nav-btn active" onclick="showTab('itinerary',this)">行程</button>
  <button class="nav-btn" onclick="showTab('bookings',this)">待訂</button>
  <button class="nav-btn" onclick="showTab('accommodation',this)">住宿 <span id="sync-ind" class="syncing" style="display:none">●</span></button>
  <button class="nav-btn" onclick="showTab('prep',this)">行前準備</button>
</nav>

<!-- PANELS -->
<div class="content">
  <div id="panel-itinerary"></div>
  <div id="panel-bookings" style="display:none"></div>
  <div id="panel-accommodation" style="display:none"></div>
  <div id="panel-prep" style="display:none"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <button class="bnav-btn active" id="bn-itinerary" onclick="showTab('itinerary',null,this)">
    <span class="bnav-icon">🗓</span><span class="bnav-label">行程</span><div class="bnav-dot" id="bd-itinerary"></div>
  </button>
  <button class="bnav-btn" id="bn-bookings" onclick="showTab('bookings',null,this)">
    <span class="bnav-icon">📋</span><span class="bnav-label">待訂</span><div class="bnav-dot" id="bd-bookings" style="display:none"></div>
  </button>
  <button class="bnav-btn" id="bn-accommodation" onclick="showTab('accommodation',null,this)">
    <span class="bnav-icon">🏡</span><span class="bnav-label">住宿</span><div class="bnav-dot" id="bd-accommodation" style="display:none"></div>
  </button>
  <button class="bnav-btn" id="bn-prep" onclick="showTab('prep',null,this)">
    <span class="bnav-icon">🎒</span><span class="bnav-label">行前準備</span><div class="bnav-dot" id="bd-prep" style="display:none"></div>

async function sheetsGet(sheet){
  try{

    return await r.json();
  }catch{return null;}
}
async function sheetsSave(sheet, data){
  try{
    const r = await fetch(API,{method:'POST',body:JSON.stringify({sheet,action:'save_all',data})});
    return await r.json();
  }catch{return null;}
}

async function loadFromSheets(){

const COORDS={

  'Milford Sound':{lat:-44.6732,lon:167.9250},Wanaka:{lat:-44.7032,lon:169.1322},

  Matamata:{lat:-37.8058,lon:175.7739},
};
const WI={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',53:'🌦',55:'🌧',61:'🌧',63:'🌧',65:'🌧',71:'🌨',80:'🌦',81:'🌧',95:'⛈'};
const WD={0:'晴天',1:'晴時多雲',2:'多雲',3:'陰天',45:'有霧',51:'毛毛雨',53:'毛毛雨',55:'毛毛雨',61:'小雨',63:'中雨',65:'大雨',71:'小雪',80:'陣雨',81:'陣雨',95:'雷陣雨'};

async function loadWeather(){
  for(const d of ITIN){
    const cl=CLIMATE[d.loc];
    if(cl) weather[d.day]={max:cl.max,min:cl.min,desc:cl.desc,icon:cl.icon,isReal:false};
    const c=COORDS[d.loc]; if(!c) continue;
    const [m,dy]=d.date.split('/').map(Number);
    const iso=`2026-${String(m).padStart(2,'0')}-${String(dy).padStart(2,'0')}`;
    try{
      const diff=(new Date(2026,m-1,dy)-new Date())/(864e5);
      if(diff<0||diff>16) continue;
      const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_mean&timezone=Pacific%2FAuckland&start_date=${iso}&end_date=${iso}`);
      const j=await r.json();
      if(j.daily) weather[d.day]={code:j.daily.weathercode[0],max:Math.round(j.daily.temperature_2m_max[0]),min:Math.round(j.daily.temperature_2m_min[0]),rain:j.daily.precipitation_probability_mean[0],isReal:true};
    }catch{}
  }
  if(currentTab==='itinerary') renderItinerary();
}

function showTab(tab, navEl, bnavEl){
  currentTab = tab;
  ['itinerary','bookings','accommodation','prep'].forEach(t=>{
    el('panel-'+t).style.display = t===tab?'':'none';
    // Nav buttons
    document.querySelectorAll('.nav-btn').forEach((b,i)=>{
      const tabs=['itinerary','bookings','accommodation','prep'];
      b.classList.toggle('active', tabs[i]===tab);
    });
    // Bottom nav
    const bn=el('bn-'+t);
    if(bn) bn.classList.toggle('active', t===tab);
    const bd=el('bd-'+t);
    if(bd) bd.style.display=t===tab?'':'none';
  });
  // Render if needed
  if(tab==='itinerary'&&!el('panel-itinerary').innerHTML) renderItinerary();
  if(tab==='bookings') renderBookings();
  if(tab==='accommodation') renderAccom();
  if(tab==='prep') renderPrep();
}

function weatherHTML(day){
  const w=weather[day];
  if(!w) return '<div class="weather-bar"><span style="font-size:.72rem;color:#7A7A6A;animation:pulse 1.4s ease infinite">天氣載入中…</span></div>';
  const icon = w.isReal?(WI[w.code]||'🌡'):w.icon;
  const desc = w.isReal?(WD[w.code]||''):w.desc;
  const rain = w.rain!=null?` · ☔ ${w.rain}%`:'';
  const badge = w.isReal?'<span class="w-badge w-real">即時預報</span>':'<span class="w-badge w-climate">氣候參考</span>';
  return `<div class="weather-bar"><span class="w-icon">${icon}</span><div style="flex:1"><div class="w-temp">${w.max}° / ${w.min}°</div><div class="w-desc">${desc}${rain}</div></div>${badge}</div>`;
}

function accomHTML(a){
  if(a.name==='—') return '';
  let badge='';
  if(a.status==='已訂') badge=`<span class="badge badge-booked">✓ 已訂 · ${esc(a.by)}</span>`;
  else if(a.status==='待訂') badge='<span class="badge badge-pending">⚠ 待訂</span>';
  else if(a.status==='同上') badge='<span class="badge badge-same">同上</span>';
  const map=a.url?`<a href="${esc(a.url)}" target="_blank" class="map-link">📍 開啟地圖</a>`:'';
  return `<div class="accom-box"><span style="font-size:1rem;flex-shrink:0;margin-top:2px">🏡</span><div><div class="accom-name">${esc(a.name)}${badge}</div><div class="accom-detail">${esc(a.detail)}</div>${map}</div></div>`;
}

// ─── ACCOMMODATION ──────────────────────────────────────────
function renderAccom(){
  const pending=stays.filter(s=>s.status==='待訂');
  const booked=stays.filter(s=>s.status==='已訂');
  let html=`<div style="font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:700;color:#3D5A47;margin-bottom:1.2rem">住宿總覽</div>`;

  // Pending
  html+=`<div class="sec-head"><div class="sec-title pend">⚠ 待訂（${pending.length}）</div><div class="sec-line"></div></div>`;
  for(const s of pending){
    html+=stayCardHTML(s,true);
  }

  // Booked
  html+=`<div class="sec-head" style="margin-top:1.5rem"><div class="sec-title booked">✓ 已訂（${booked.length}）</div><div class="sec-line"></div></div>`;
  for(const s of booked){
    html+=stayCardHTML(s,false);
  }
  el('panel-accommodation').innerHTML=html;
  // Bind events
  el('panel-accommodation').querySelectorAll('[data-stay-status]').forEach(sel=>{
    sel.addEventListener('change',function(){
      const id=this.dataset.stayId;
      const s=stays.find(x=>x.id===id);
      if(s){ s.status=this.value; saveStays().then(()=>renderAccom()); }
    });
  });
  el('panel-accommodation').querySelectorAll('[data-stay-field]').forEach(inp=>{
    inp.addEventListener('change',function(){
      const id=this.dataset.stayId;
      const field=this.dataset.stayField;
      const s=stays.find(x=>x.id===id);
      if(s){ s[field]=this.value; saveStays(); }
    });
  });
  el('panel-accommodation').querySelectorAll('[data-edit-stay]').forEach(btn=>{
    btn.addEventListener('click',function(){
      const id=this.dataset.editStay;
      editStays[id]=!editStays[id];
      renderAccom();
    });
  });
}

  });
  packHtml+=`<div style="font-size:.72rem;color:#5A7A62;text-align:right;padding:.5rem 0">✓ 所有資料自動儲存</div></div>`;

  el('panel-prep').innerHTML=tabsHtml+sectionsHtml+packHtml;
}

// ─── PREP ACTIONS ───────────────────────────────────────────
function setMember(m){
  currentMember=m;
  renderPrep();
}
function updatePrep(m,field,value){
  if(!prepData[m]) prepData[m]={};
  prepData[m][field]=value;
  localStorage.setItem('nz6_prep',JSON.stringify(prepData));
}
function toggleCat(ci){
  openCats[ci]=!openCats[ci];
  renderPrep();
}
function togglePack(m,item){
  if(!pack[m]) pack[m]={};
  pack[m][item]=!pack[m][item];
  localStorage.setItem('nz6_pack',JSON.stringify(pack));
  renderPrep();
}

// ─── INIT ───────────────────────────────────────────────────
showTab('itinerary');
loadFromSheets();
loadWeather();
</script>
